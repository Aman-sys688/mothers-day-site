<!-- SAVE AS index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,#2a003f,#090011 55%,#000);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* BACKGROUND GLOW */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:0.45;
animation:move 12s infinite alternate;
}

.glow1{
width:350px;
height:350px;
background:#ff0080;
top:-80px;
left:-100px;
}

.glow2{
width:400px;
height:400px;
background:#6a00ff;
bottom:-120px;
right:-100px;
animation-delay:3s;
}

@keyframes move{
from{
transform:translateY(0px) translateX(0px);
}
to{
transform:translateY(40px) translateX(40px);
}
}

/* CARD */

.card{
position:relative;
width:420px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:
0 0 40px rgba(255,0,150,0.25),
0 0 80px rgba(111,0,255,0.15);
text-align:center;
z-index:5;
animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.photo-wrap{
position:relative;
display:inline-block;
margin-bottom:20px;
}

.photo-wrap::before{
content:'';
position:absolute;
inset:-8px;
border-radius:20px;
background:linear-gradient(45deg,#ff0080,#7b00ff,#00c3ff);
z-index:-1;
filter:blur(10px);
opacity:0.9;
animation:rotate 6s linear infinite;
}

@keyframes rotate{
100%{
filter:blur(14px) hue-rotate(360deg);
}
}

.photo{
width:220px;
height:260px;
object-fit:cover;
border-radius:20px;
border:3px solid rgba(255,255,255,0.15);
}

h1{
font-size:42px;
font-weight:800;
margin-bottom:15px;
background:linear-gradient(to right,#ff66c4,#c084ff,#6ee7ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:16px;
line-height:1.7;
color:#ddd;
margin-bottom:25px;
}

/* BUTTON */

button{
padding:14px 30px;
border:none;
border-radius:50px;
font-size:16px;
font-weight:600;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff0080,#7b00ff);
box-shadow:0 0 25px rgba(255,0,150,0.5);
transition:0.35s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 45px rgba(255,0,150,0.9);
}

/* SECRET MESSAGE */

#message{
margin-top:25px;
font-size:20px;
font-weight:600;
color:#ffb3ff;
opacity:0;
transition:1s;
transform:translateY(10px);
}

#message.show{
opacity:1;
transform:translateY(0);
}

/* FLOATING HEARTS */

.heart{
position:absolute;
bottom:-20px;
font-size:22px;
animation:float linear forwards;
opacity:0.7;
}

@keyframes float{
to{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* MUSIC BUTTON */

.music{
position:absolute;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
z-index:10;
}

.music:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="bg">
<div class="glow glow1"></div>
<div class="glow glow2"></div>
</div>

<div class="music" onclick="toggleMusic()">🎵</div>

<div class="card">

<div class="photo-wrap">
<img src="mom.jpg" class="photo">
</div>

<h1>Happy Mother's Day</h1>

<p>
You are the reason behind every good thing in my life.
Thank you for every sacrifice, every smile,
and every moment you stood beside me.
</p>

<button onclick="revealMessage()">Open Message ❤️</button>

<div id="message">
I love you Mom.<br>
Forever and always ❤️
</div>

</div>

<audio id="song" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const msg=document.getElementById("message");

function revealMessage(){
msg.classList.add("show");

for(let i=0;i<25;i++){
createHeart();
}
}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=
(Math.random()*3+4)+"s";

heart.style.fontSize=
(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);
}

const song=document.getElementById("song");

function toggleMusic(){

if(song.paused){
song.play();
}
else{
song.pause();
}

}

</script>

</body>
</html>
